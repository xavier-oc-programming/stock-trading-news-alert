name: Stock Trading News Alert

on:
  schedule:
    # Runs at 07:00 CET (UTC+1, winter) = 06:00 UTC
    # DST note: in summer (CEST = UTC+2), this fires at 08:00 local.
    # To target 07:00 year-round, change to '0 5 * * *' during summer.
    - cron: '0 6 * * 1-5'  # weekdays only — markets are closed on weekends
  workflow_dispatch:        # allow manual runs from the GitHub UI

jobs:
  send-alert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock trading news alert
        run: python advanced/main.py
        env:
          API_KEY_ALPHA:      ${{ secrets.API_KEY_ALPHA }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:        ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:          ${{ secrets.TWILIO_TO }}
